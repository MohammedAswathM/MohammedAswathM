name: GitHub Profile Summary Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: MohammedAswathM
          BRANCH_NAME: main
          UTC_OFFSET: 5.5
          AUTO_PUSH: true
